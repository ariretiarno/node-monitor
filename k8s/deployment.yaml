apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-monitor
  namespace: test-ari-2
  labels:
    app: node-monitor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: node-monitor
  template:
    metadata:
      labels:
        app: node-monitor
    spec:
      serviceAccountName: node-monitor
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: node-monitor
              topologyKey: kubernetes.io/hostname
      containers:
      - name: monitor
        image: 107126629234.dkr.ecr.ap-southeast-1.amazonaws.com/testari:nodemon
        imagePullPolicy: Always
        env:
        - name: GOOGLE_CHAT_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: node-monitor-secret
              key: GOOGLE_CHAT_WEBHOOK_URL
        - name: THRESHOLD_MINUTES
          valueFrom:
            configMapKeyRef:
              name: node-monitor-config
              key: THRESHOLD_MINUTES
        - name: CHECK_INTERVAL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: node-monitor-config
              key: CHECK_INTERVAL_SECONDS
        - name: ENABLE_LEADER_ELECTION
          value: "true"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
